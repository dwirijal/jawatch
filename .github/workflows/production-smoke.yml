name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run production smoke checks
        env:
          BASE_URL: https://weebs.dwizzy.my.id
          SMOKE_TIMEOUT_MS: 15000
        run: node scripts/production-smoke-check.mjs

      - name: Notify Discord on failure
        if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "content": (
                  "dwizzyWEEB production smoke failed\n"
                  f"workflow: {os.environ['GITHUB_WORKFLOW']}\n"
                  f"job: smoke\n"
                  f"ref: {os.environ['GITHUB_REF_NAME']}\n"
                  f"run: {os.environ['RUN_URL']}"
              )
          }
          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req):
              pass
          PY
