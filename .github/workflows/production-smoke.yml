name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run production smoke checks
        env:
          BASE_URL: https://weebs.dwizzy.my.id
          SMOKE_TIMEOUT_MS: 15000
        run: node scripts/production-smoke-check.mjs
