name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "content": (
                  "dwizzyWEEB CI quality failed\n"
                  f"workflow: {os.environ['GITHUB_WORKFLOW']}\n"
                  f"job: quality\n"
                  f"ref: {os.environ['GITHUB_REF_NAME']}\n"
                  f"run: {os.environ['RUN_URL']}"
              )
          }
          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req):
              pass
          PY

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Enforce route budgets
        run: npm run perf:budgets

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "content": (
                  "dwizzyWEEB CI build failed\n"
                  f"workflow: {os.environ['GITHUB_WORKFLOW']}\n"
                  f"job: build\n"
                  f"ref: {os.environ['GITHUB_REF_NAME']}\n"
                  f"run: {os.environ['RUN_URL']}"
              )
          }
          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req):
              pass
          PY
